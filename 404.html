<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Not found — Small Free Tools</title>
<meta name="robots" content="noindex" />
<style>
  :root { --ink:#14110f; --paper:#faf7f2; --muted:#8a7f72; --accent:#1f6b4f;
    --mono:"SF Mono","Roboto Mono",ui-monospace,"Cascadia Code",Menlo,monospace; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--paper); color:var(--ink); min-height:100vh; display:grid; place-items:center;
    font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Helvetica,Arial,sans-serif; padding:22px; }
  .card { text-align:center; max-width:46ch; }
  .code { font-family:var(--mono); font-size:13px; letter-spacing:.16em; color:var(--accent); margin-bottom:14px; }
  h1 { font-size:clamp(26px,5vw,38px); letter-spacing:-.02em; margin-bottom:12px; }
  p { color:var(--muted); margin-bottom:22px; }
  a.btn { display:inline-block; font-family:var(--mono); font-size:14px; color:#fff; background:var(--accent);
    padding:11px 18px; border-radius:9px; text-decoration:none; }
</style>
</head>
<body>
  <div class="card">
    <div class="code">404 · NOT FOUND</div>
    <h1>This page doesn't exist.</h1>
    <p>But the tools do — credit-card timing calculators and money-deadline reminders, all free and all in your browser.</p>
    <a class="btn" href="https://ababa1326.github.io/">See all tools →</a>
  </div>
</body>
</html>
